name: Update Leaderboard

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate leaderboard
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: python3 scripts/generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "agentflex-bot"
          git config user.email "bot@agentflex.vip"
          git add index.html data/known_agents.json data/discovered-agents.txt
          git diff --staged --quiet || git commit -m "Update leaderboard [bot]" && git push
